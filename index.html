<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarswati Library - Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-shape"></div>
    
    <div class="glass-container">
        <header>
            <h1>Sarswati Library</h1>
            <div class="legend">
                <span class="dot vacant"></span> Vacant &nbsp;&nbsp;
                <span class="dot partial"></span> Partial &nbsp;&nbsp;
                <span class="dot full"></span> Full
            </div>
            
            <!-- 🎛️ Filter Buttons -->
            <div class="filters">
                <button class="filter-btn active" onclick="filterSeats('All')">All Seats</button>
                <button class="filter-btn" onclick="filterSeats('Vacant')">Vacant</button>
                <button class="filter-btn" onclick="filterSeats('Full Day')">Full Day</button>
                <button class="filter-btn" onclick="filterSeats('Shift A')">Shift A</button>
                <button class="filter-btn" onclick="filterSeats('Shift B')">Shift B</button>
                <button class="filter-btn" onclick="filterSeats('Shift C')">Shift C</button>
            </div>
        </header>

        <div class="dashboard">
            <!-- 💺 Seat Grid -->
            <div class="seat-grid" id="seat-grid">
                <!-- JS se 36 seats aayengi -->
            </div>
        </div>
    </div>

    <!-- 📝 Booking/Update Modal Popup -->
    <div id="booking-modal" class="modal-overlay hidden">
        <div class="modal-content glass-panel">
            <span class="close-btn" onclick="closeModal()">×</span>
            <h2 id="panel-title">Book Seat</h2>
            <form id="booking-form">
                <input type="hidden" id="seat-no">
                <input type="text" id="student-name" placeholder="Student Name" required>
                <input type="text" id="mobile" placeholder="Mobile Number" required>
                <input type="text" id="address" placeholder="Address" required>
                
                <select id="slot-type" required>
                    <option value="" disabled selected>Select Time Slot</option>
                    <option value="Full Day">Full Day (6 AM - 10 PM)</option>
                    <option value="Shift A">Shift A (6 AM - 11 AM)</option>
                    <option value="Shift B">Shift B (11 AM - 4 PM)</option>
                    <option value="Shift C">Shift C (4 PM - 10 PM)</option>
                </select>

                <div class="date-row">
                    <div>
                        <label>Join Date</label>
                        <input type="date" id="join-date" required>
                    </div>
                    <div>
                        <label>Next Payment</label>
                        <input type="date" id="next-pay-date" required>
                    </div>
                </div>

                <input type="number" id="price" placeholder="Price Paid (₹)" required>
                
                <div class="modal-actions">
                    <button type="submit" id="submit-btn" class="save-btn">Save Booking</button>
                    <button type="button" id="delete-btn" class="del-btn hidden" onclick="deleteBooking()">Clear Seat</button>
                </div>
            </form>
            <div id="status-msg"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
